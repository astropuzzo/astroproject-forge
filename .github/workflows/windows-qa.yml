name: Windows QA

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa-win-x64:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Run P0 QA gate
        shell: pwsh
        run: ./qa-gate.ps1
      - name: Upload QA report and self-contained app
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: astroproject-forge-win-x64-qa
          if-no-files-found: error
          retention-days: 14
          path: |
            artifacts/qa/qa-report.json
            dist-dotnet/AstroForge.App.exe
